name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const assignee = pr.assignee?.login || pr.user.login;
            const reviewers = pr.requested_reviewers.map(r => r.login);
            let content = '';
            if (reviewers.length > 0) {
              content = `${assignee} requests review from ${reviewers.join(', ')}`;
            }
            core.setOutput('content', content);
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" -d \
            "{
              \"content\": \"${{ steps.msg.outputs.content }}\",
              \"embeds\": [{
                \"title\": \"${{ github.event.pull_request.title }}\",
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"description\": \"PR #${{ github.event.pull_request.number }} by ${{ github.event.pull_request.user.login }}\",
                \"color\": 5814783
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
