name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('client/bun.lock') }}
          restore-keys: bun-

      - name: Install client dependencies
        run: cd client && bun install

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-gdtoolkit

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Lint
        run: ./scripts/ci/lint.sh

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('client/bun.lock') }}
          restore-keys: bun-

      - name: Install client dependencies
        run: cd client && bun install

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot4
          key: godot-4.6-stable-linux-x86_64

      - name: Install Godot 4.6
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: ./scripts/ci/install-godot.sh

      - name: Check
        run: ./scripts/ci/check.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot4
          key: godot-4.6-stable-linux-x86_64

      - name: Install Godot 4.6
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: ./scripts/ci/install-godot.sh

      - name: Import project assets
        run: godot4 --headless --path godot --import

      - name: Test
        run: ./scripts/ci/test.sh
