name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('client/bun.lock') }}
          restore-keys: bun-

      - name: Install client dependencies
        run: cd client && bun install

      - name: Lint TypeScript/Astro (Biome)
        run: cd client && bun run lint

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-gdtoolkit

      - name: Install gdlint
        run: pip install gdtoolkit

      - name: Lint GDScript (gdlint)
        run: find godot -name "*.gd" | xargs gdlint

      - name: Check GDScript format (gdformat)
        run: find godot -name "*.gd" | xargs gdformat --diff --check

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('client/bun.lock') }}
          restore-keys: bun-

      - name: Install client dependencies
        run: cd client && bun install

      - name: Type-check TypeScript (tsc)
        run: cd client && bunx tsc --noEmit

      - name: Build Astro site
        run: cd client && bun run build

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot4
          key: godot-4.6-stable-linux-x86_64

      - name: Install Godot 4.6
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot4
          sudo chmod +x /usr/local/bin/godot4

      - name: Check GDScript (Godot compiler)
        run: |
          godot4 --headless --path godot --import
          exit_code=0
          for gd_file in $(find godot -name "*.gd"); do
            rel="res://${gd_file#godot/}"
            out=$(godot4 --headless --path godot --script "$rel" --check-only 2>&1 || true)
            if echo "$out" | grep -q "SCRIPT ERROR: Parse Error:"; then
              echo "$out" | grep -A1 "SCRIPT ERROR: Parse Error:" | grep -v "^--$"
              exit_code=1
            fi
          done
          exit $exit_code

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot4
          key: godot-4.6-stable-linux-x86_64

      - name: Install Godot 4.6
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot4
          sudo chmod +x /usr/local/bin/godot4

      - name: Import project assets
        run: godot4 --headless --path godot --import

      - name: Run tests
        run: |
          OUTPUT=$(godot4 --headless --path godot res://scenes/tests/TestRunner.tscn 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "\[FAIL\]"; then
            echo "❌ Tests failed!"
            exit 1
          fi
          echo "✅ All tests passed!"
