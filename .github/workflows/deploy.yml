name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/test.yml

  deploy:
    name: Build & Deploy
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Godot 4.6
        run: ./scripts/ci/install-godot.sh

      - name: Install Godot export templates
        run: ./scripts/ci/install-templates.sh

      - name: Export Godot game
        run: |
          mkdir -p client/public/godot
          godot4 --headless --path godot --import
          godot4 --headless --path godot --export-release "Web" ../client/public/godot/index.html

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install client dependencies
        run: cd client && bun install

      - name: Build Astro site
        run: cd client && bun run build
        env:
          BASE_URL: /EMS_Game

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: server/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
